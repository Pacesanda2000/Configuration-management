stages:
  - test
  - build
  - deploy
  - cleanup

variables:
  ANSIBLE_LOCAL_PATH: /home/gitlab-runner/builds/zvN3A5z1/0/dualedu/2022-2023/sis/dmajoros/ansible

before_script:
  - sudo yum update -y
  - sudo yum install -y ansible 
  - ansible --version 

ping-nodes:
  stage: test
  tags: 
    - dualedu-docker
  script:
    - ansible all_nodes -i "$ANSIBLE_LOCAL_PATH/hosts" -m ping
  when: manual

preparation-tasks:
  stage: test
  tags: 
    - dualedu-docker
  script: 
    - ansible-playbook -i "$ANSIBLE_LOCAL_PATH/hosts" preparation_tasks.yaml
  when: manual
  
k3s-setup:
  stage: build
  tags: 
    - dualedu-docker
  script: 
    - ansible-playbook -i "$ANSIBLE_LOCAL_PATH/hosts" k3s_install.yaml
    - cat k3s.yaml
  artifacts:
    paths:
      - "k3s.yaml"
  when: manual

k3s-cleanup:
  stage: cleanup
  tags: 
    - dualedu-docker
  script: 
    - ansible-playbook -i "$ANSIBLE_LOCAL_PATH/hosts" k3s_cleanup.yaml
  when: manual


  









  

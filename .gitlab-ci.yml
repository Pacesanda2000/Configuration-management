stages:
  - test
  - build
  - deploy

variables:
  ANSIBLE_LOCAL_PATH: /home/gitlab-runner/builds/zvN3A5z1/0/dualedu/2022-2023/sis/dmajoros/ansible

before_script:
  - sudo yum update -y
  #- sudo yum install -y ansible
  - pip3 install ansible 
  - ansible --version | grep "python version"


ping-nodes:
  stage: test
  tags: 
    - dualedu-docker
  script:
    - ansible all_nodes -i "$ANSIBLE_LOCAL_PATH/hosts" -m ping


docker-install:
  stage: build
  tags:
    - dualedu-docker
  script:
    - ansible-playbook -i "$ANSIBLE_LOCAL_PATH/hosts" install_docker.yaml
  when: manual

container-deployment:
  stage: deploy
  tags:
    - dualedu-docker
  script:
    - ansible-playbook -i  "$ANSIBLE_LOCAL_PATH/hosts" deploy_container.yaml
  when: manual


  

---
- name: Workers labelling
  hosts: master1
  become: yes
  environment:
    PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/root/bin:usr/local/bin/kubectl"
  tasks:
    - name: Workers labelling on master1 node
      shell: kubectl label nodes -l '!node-role.kubernetes.io/master' node-role.kubernetes.io/worker=worker

    - name: Nodes status in cluster
      shell: kubectl get nodes -o wide
      register: node_status

    - name: Display nodes status
      ansible.builtin.debug:
        var: node_status.stdout_lines


- name: MetalLB setup
  hosts: master1
  become: yes
  environment:
    PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/root/bin:usr/local/bin/kubectl"
  tasks:
    - name: Apply MetalLB native manifest
      ansible.builtin.shell: kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.13.9/config/manifests/metallb-native.yaml

    - name: Download MetalLB pool-1 YAML
      ansible.builtin.get_url:
        url: "https://gitlab.dual.edu/dualedu/2022-2023/sis/dmajoros/ansible/metallb/pool-1.yaml"
        dest: "/root/pool-1.yaml"

    - name: Apply MetalLB pool-1 configuration
      ansible.builtin.shell: kubectl apply -f /root/pool-1.yaml -n metallb-system

    - name: Apply MetalLB l2advertisement configuration
      ansible.builtin.shell: kubectl apply -f https://gitlab.dual.edu/dualedu/2022-2023/sis/dmajoros/ansible/metallb/l2advertisement.yaml -n metallb-system
    

---
  - name: Deploy Container
    hosts: worker  
    become_user: root

    tasks:
      - name: Pull Docker image
        docker_image:
          name: dmajoros/testimages:latest  
          source: pull

      - name: Run Docker container
        docker_container:
          name: test_container  
          image: dmajoros/testimages:latest  
          ports:
            - "8004:80"  

      - name: Wait for container to start
        wait_for:
          host: "localhost"
          port: 8004
          state: started

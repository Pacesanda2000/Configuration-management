---
- name: K3S installation and join cluster 
  hosts: master_main
  become: yes

  vars:
    k3s_server_IP: "10.207.0.143"
    k3s_token: "dual-edu-token"

  tasks:
    - name: Install k3s on master node
      set_fact:
        script_content: |
          #!/bin/bash
          curl -sfL https://get.k3s.io | K3S_TOKEN=dual-edu-token sh -s - server \
	            --node-taint CriticalAddonsOnly=true:NoExecute \
              --cluster-init \
              --write-kubeconfig-mode "0644" \
	            --disable servicelb \
              --disable traefik
              
    - name: Pridať obsah do súboru a nastaviť oprávnenia
      ansible.builtin.copy:
        content: "{{ script_content }}"
        dest: /root/k3s-instalation.sh  
        mode: '0755'  

    - name: Spustiť skript
      ansible.builtin.shell: /root/k3s-instalation.sh
      

---
- name: K3S installation and join cluster 
  hosts: all_nodes
  become: yes
  tasks:
    - name: Create k3s installation script for master_main
      ansible.builtin.copy:
        content: |
          #!/bin/bash
          curl -sfL https://get.k3s.io | sh -s - server \
              --token dual-edu-token \
              --node-taint CriticalAddonsOnly=true:NoExecute \
              --cluster-init \
              --write-kubeconfig-mode "0644" \
              --disable servicelb \
              --disable traefik
        dest: /root/k3s-installation.sh
        mode: '0755'
      when: "'master_main' in group_names"

    - name: Create k3s installation script for worker
      ansible.builtin.copy:
        content: |
          #!/bin/bash
          curl -sfL https://get.k3s.io | K3S_TOKEN=dual-edu-token sh -s - agent --server https://10.207.0.143:6443
        dest: /root/k3s-installation.sh
        mode: '0755'
      when: "'worker' in group_names"

    - name: Create k3s installation script for master_slave
      ansible.builtin.copy:
        content: |
          #!/bin/bash
          curl -sfL https://get.k3s.io | sh -s - server \
              --token dual-edu-token \
              --server https://10.207.0.143:6443 \
              --node-taint CriticalAddonsOnly=true:NoExecute \
              --write-kubeconfig-mode "0644" \
              --disable servicelb \
              --disable traefik 
        dest: /root/k3s-installation.sh
        mode: '0755'
      when: "'master_slave' in group_names"

    - name: Run k3s installation script
      ansible.builtin.shell: /root/k3s-installation.sh
      when: "'master_main' in group_names"

    - name: Pause for one minute
      ansible.builtin.pause:
        seconds: 60

    - name: Run k3s installation script
      ansible.builtin.shell: /root/k3s-installation.sh
      when: "'worker' in group_names or 'master_slave' in group_names"


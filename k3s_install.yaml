---
- name: Install k3s and join into cluster 

  hosts: all_nodes
  become: yes

  vars:
    k3s_server_IP: "10.207.0.18"

  tasks:
    - name: Install k3s on master node
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION=v1.26.2+k3s1 sh -
        sed -i -e 's/127.0.0.1/{{ k3s_server_IP }}/g' /etc/rancher/k3s/k3s.yaml
      when: "'master' in group_names"

    - name: Read k3s token from file
      command: cat /var/lib/rancher/k3s/server/node-token
      register: k3s_token
      when: "'master' in group_names"

    - name: Print k3s token  
      debug:
        msg: "{{ k3s_token.stdout }}"
      when: "'master' in group_names"

    - name: Install k3s on worker nodes
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION=v1.26.2+k3s1 K3S_URL=https://{{ k3s_server_IP }}:6443 K3S_TOKEN={{ k3s_token }} sh -
      when: "'worker' in group_names" 

#K3S_NODE_ROLE="worker"
K3S_TOKEN={{ k3s_token.stdout }}
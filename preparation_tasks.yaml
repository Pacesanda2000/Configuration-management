---
- name: Preparation tasks
  hosts: all_nodes
  become: yes
  tasks:
    - name: install updates using yum
      yum:
        name: "*"
        state: latest
    
    - name: reboot the server if required
      shell: sleep 3; reboot
      ignore_errors: true
      changed_when: false
      async: 1
      poll: 0

    - name: wait for server to come back after reboot
      wait_for_connection:
        timeout: 120
        delay: 20
      register: reboot_result

    - name: reboot time
      debug:
        msg: "The system rebooted in {{ reboot_result.elapsed }} seconds."

    - name: Firewall disabling
      command: systemctl disable firewalld --now

    - name: Swap status
      shell: swapon -s
      register: swap_status
      ignore_errors: yes

    - name: Swap off depend on status
      command: swapoff /dev/mapper/centos-swap
      when: "'/dev/mapper/centos-swap' in swap_status.stdout"
